name: CI

on:
  push:
    branches:
      - main

jobs:

  validate:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Validate JSON
        run: |
          jq empty website/snapshot/snapshot.json

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint Bash
        run: |
          shellcheck cmd/*.sh

      - name: Check website
        run: |
          test -f website/index.html
          test -f website/style.css
          test -f website/app.js

      - name: Success
        run: echo "Repository looks good."